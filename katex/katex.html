<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        #LaTeX {
            border: 1px solid #ccc;
            outline: none;
            padding: 10px;
            font-family: monospace;
            min-height: 40px;
            margin-bottom: 10px;
        }
        #output {
            padding: 15px;
            display: inline-block;
            min-width: 100px;
        }
        button {
            margin-top: 15px;
            padding: 8px 15px;
            cursor: pointer;
            display: block;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <script>
        window.onload = () => {
        const el = document.getElementById('output');
        el.innerText = new URLSearchParams(window.location.search).get('latex');
        try {
            el.innerHTML = katex.renderToString(document.getElementById("output").textContent.trim(), {displayMode: true});
        } catch(e){}

        async function logBase64Image() {
            const outputDiv = document.getElementById('output');
            
            try {
                const dataUrl = await htmlToImage.toPng(outputDiv, { 
                    backgroundColor: '#ffffff',
                    pixelRatio: 2
                });

                const base64String = dataUrl.split(',')[1];
                
                window.renderedBase64 = base64String;

            } catch (error) {
                console.error("Oops, something went wrong during image conversion!", error);
            }
        }
        logBase64Image();
    };
    </script>
</body>
</html>
